<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moaid - مساعد مستر تامر الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- رأس الصفحة -->
        <header class="header">
            <div class="header-content">
                <h1>🤖 Moaid</h1>
                <p>مساعد مستر تامر الذكي</p>
            </div>
            <div class="header-info">
                <span>📱 01131413209</span>
                <span>🟢 متاح الآن</span>
            </div>
        </header>

        <!-- منطقة الدردشة -->
        <div class="chat-container">
            <div id="chatBox" class="chat-box">
                <div class="message bot-message">
                    <p>👋 مرحباً! أنا Moaid، مساعد مستر تامر الذكي</p>
                    <p>كيف يمكنني مساعدتك اليوم؟</p>
                </div>
            </div>
        </div>

        <!-- منطقة الإدخال -->
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="اكتب سؤالك هنا..."
                class="input-field"
            >
            <button id="sendBtn" class="send-button">إرسال ✉️</button>
        </div>

        <!-- التوقيع -->
        <footer class="footer">
            <p>✨ Moaid - مساعد مستر تامر الذكي | متاح 24/7</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
